name: Sync Backend to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      # Rename the backend README to be the main README for this Space
      - name: Prepare Backend README
        run: |
          mv README_backend_space.md README.md
          
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push https://Revanthcsv:$HF_TOKEN@huggingface.co/spaces/Revanthcsv/emotion-music-backend HEAD:main --force
